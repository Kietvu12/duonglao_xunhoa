# HTTP - Redirect to HTTPS (máy proxy nên làm điều này để tăng bảo mật)
server {
    listen 80;
    server_name kidolock.com www.kidolock.com;
    client_max_body_size 300M;
    return 301 https://kidolock.com$request_uri;
}
server {
    listen 443 ssl http2;
    server_name kidolock.com www.kidolock.com;
    client_max_body_size 300M;
    ssl_certificate /etc/letsencrypt/live/kidolock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidolock.com/privkey.pem;
    gzip off;
    proxy_max_temp_file_size 0;

 if ($host = www.kidolock.com) {
    return 301 https://kidolock.com$request_uri;
}
 location / {

    proxy_pass https://192.168.100.172;

    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_request_buffering off;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_read_timeout 3600;
}

    keepalive_timeout 65;
}