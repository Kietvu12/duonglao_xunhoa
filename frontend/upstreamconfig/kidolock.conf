server {
    listen 80;
    server_name kidolock.com www.kidolock.com;
    return 301 https://$host$request_uri;
    client_max_body_size 300M;
}

server {
    listen 443 ssl;
    server_name kidolock.com www.kidolock.com;
    gzip off;
    proxy_max_temp_file_size 0;
    client_max_body_size 300M;
    ssl_certificate /etc/letsencrypt/live/kidolock.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kidolock.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    root /home/frontend/kidolock;
    index index.html;

    if ($host = www.kidolock.com) {
        return 301 https://kidolock.com$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html?$args;
    }
     location /api_kidlock/ {
        client_max_body_size 300M;
        rewrite ^/api_kidlock/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api_kidolocks/ {
        client_max_body_size 300M;
        rewrite ^/api_kidolocks/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    

    location /api_appkidlocks/ {
        rewrite ^/api_appkidlocks/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:6868;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

location /ws_kidlock/ {

    proxy_pass http://127.0.0.1:6869;

    proxy_http_version 1.1;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "Upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    proxy_read_timeout 3600;
}

    location /php_kido/ {
        return 404;
    }

    location ~ ^/php_kido/(?<script>.+\.php)$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME /home/api/php_kido/$script;
        fastcgi_param DOCUMENT_ROOT /home/api/php_kido;
    }
}
