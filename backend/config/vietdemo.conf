server {
    listen 80;
    server_name duonglaoxuanhoa.net www.duonglaoxuanhoa.net;
    return 301 https://$host$request_uri;

}

server {
    listen 443 ssl http2;
    server_name duonglaoxuanhoa.net;
    gzip off;
proxy_max_temp_file_size 0;
    ssl_certificate /etc/letsencrypt/live/duonglaoxuanhoa.net/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/duonglaoxuanhoa.net/privkey.pem; # managed by Certbot

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;


    root /usr/share/nginx/html/quanlyduonglao;  
    index index.html;

    location / {
        try_files $uri $uri/ /index.html?$args;
    }
    location /api_quanlyduonglao/ {
        rewrite ^/api_quanlyduonglao/(.*)$ /$1 break;  
        proxy_pass http://127.0.0.1:4545;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    location /api_quanlyduonglaoapp/ {
        rewrite ^/api_quanlyduonglaoapp/(.*)$ /$1 break; 
        proxy_pass http://127.0.0.1:6540;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
  location /api_quanlyduonglao/socket.io/ {
        proxy_pass http://127.0.0.1:4545/socket.io/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

}
