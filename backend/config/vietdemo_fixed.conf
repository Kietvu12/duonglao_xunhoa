# HTTP - Redirect to HTTPS (máy proxy nên làm điều này để tăng bảo mật)
server {
    listen 80;
    server_name duonglaoxuanhoa.net;
    client_max_body_size 200M;

    location / {
        proxy_pass http://192.168.100.172/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
	
}
server {
    listen 443 ssl http2;
    server_name duonglaoxuanhoa.net;
    client_max_body_size 200M;
    ssl_certificate /etc/letsencrypt/live/duonglaoxuanhoa.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/duonglaoxuanhoa.net/privkey.pem;
    gzip off;
    proxy_max_temp_file_size 0;

    # Location riêng cho Socket.IO - QUAN TRỌNG: Phải đặt TRƯỚC location / để ưu tiên
    # Chỉ cần location này vì WebSocket cần headers đặc biệt
    location /api_quanlyduonglao/socket.io/ {
        proxy_pass https://192.168.100.172/api_quanlyduonglao/socket.io/;
        proxy_http_version 1.1;
        
        # WebSocket upgrade headers - BẮT BUỘC cho WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket timeouts - QUAN TRỌNG: Phải đặt timeout dài
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_connect_timeout 86400;
        
        # Disable buffering cho WebSocket
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # Location mặc định - proxy tất cả request còn lại đến upstream
    # (Bao gồm cả /api_quanlyduonglao/ và frontend)
    location / {
        proxy_pass https://192.168.100.172/;
        proxy_request_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    keepalive_timeout 65;
}

